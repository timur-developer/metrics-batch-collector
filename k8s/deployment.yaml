apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-batch-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-batch-collector
  template:
    metadata:
      labels:
        app: metrics-batch-collector
    spec:
      containers:
        - name: app
          image: metrics-batch-collector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: metrics-batch-collector-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
